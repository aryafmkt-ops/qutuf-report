  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

latin */\n@font-face {\n  font-family: 'Reem Kufi';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"754c0df9-05e5-466b-b5f8-41c5d7e1d880\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  :root{\n    --bg:#F4EBDD;\n    --surface:#FFFCF7;\n    --ink:oklch(0.32 0.03 48);\n    --muted:oklch(0.52 0.03 48);\n    --faint:oklch(0.64 0.03 50);\n    --line:oklch(0.9 0.016 60);\n    --line-strong:oklch(0.83 0.022 55);\n\n    --cream:#E6DCCC;\n    --cocoa:oklch(0.36 0.045 42);\n    --cocoa-2:oklch(0.30 0.045 40);\n\n    --accent:oklch(0.665 0.092 47);\n    --accent-deep:oklch(0.52 0.094 44);\n    --accent-soft:oklch(0.665 0.092 47 / 0.15);\n\n    --c-snap:oklch(0.74 0.15 85);\n    --c-tiktok:oklch(0.55 0.12 20);\n    --c-insta:oklch(0.58 0.13 320);\n    --c-x:oklch(0.55 0.07 240);\n    --c-google:oklch(0.62 0.10 200);\n\n    --good:oklch(0.56 0.07 135);\n    --good-soft:oklch(0.56 0.07 135 / 0.16);\n    --info:oklch(0.56 0.10 250);\n    --info-soft:oklch(0.56 0.10 250 / 0.12);\n  }\n  *{box-sizing:border-box;}\n  html{-webkit-print-color-adjust:exact;print-color-adjust:exact;}\n  body{\n    margin:0;background:var(--bg);color:var(--ink);\n    font-family:\"Calibri MOB\",\"Calibri\",\"IBM Plex Sans Arabic\",system-ui,sans-serif;\n    font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased;\n  }\n  .doc{max-width:8.6in;margin:0 auto;background:var(--bg);}\n  .pad{padding:0 clamp(20px,5vw,0.72in);}\n  h1,h2,h3,.display,.brand .nm,.hero-stats .hs .v,.donut-center .big{\n    font-family:\"Calibri MOB\",\"Calibri\",\"IBM Plex Sans Arabic\",sans-serif;}\n  .tnum{font-variant-numeric:tabular-nums;}\n\n  /* ============ HERO ============ */\n  .hero{position:relative;overflow:hidden;color:var(--cream);\n    background:\n      radial-gradient(120% 140% at 88% -10%, oklch(0.72 0.085 55) 0%, transparent 55%),\n      radial-gradient(90% 130% at -5% 115%, oklch(0.47 0.085 38) 0%, transparent 52%),\n      linear-gradient(157deg, oklch(0.665 0.092 47) 0%, oklch(0.52 0.085 40) 100%);\n    padding:46px clamp(20px,5vw,0.72in) 38px;}\n  .hero::after{content:\"\";position:absolute;right:-80px;top:-90px;width:300px;height:300px;\n    border-radius:50%;border:1.5px solid rgba(255,255,255,0.14);}\n  .hero .ring2{position:absolute;right:-30px;top:-40px;width:200px;height:200px;\n    border-radius:50%;border:1.5px solid rgba(255,255,255,0.10);}\n  .hero-top{display:flex;justify-content:space-between;align-items:center;\n    position:relative;z-index:2;}\n  .brand{display:flex;align-items:center;gap:13px;}\n  .mark{width:52px;height:52px;border-radius:14px;flex:none;object-fit:cover;\n    box-shadow:0 8px 22px rgba(80,40,20,0.35);outline:1.5px solid rgba(255,255,255,0.35);\n    outline-offset:-1.5px;}\n  .brand .nm{font-size:23px;font-weight:700;line-height:1;color:var(--cream);}\n  .brand .tg{font-size:11.5px;color:rgba(255,255,255,0.78);font-weight:500;margin-top:4px;}\n  .pill{font-size:11px;font-weight:600;letter-spacing:0.04em;padding:7px 14px;\n    border:1px solid rgba(255,255,255,0.32);border-radius:99px;color:var(--cream);\n    background:rgba(255,255,255,0.10);backdrop-filter:blur(4px);}\n\n  .hero-title{position:relative;z-index:2;margin-top:34px;}\n  .hero-title .kick{font-size:12px;letter-spacing:0.22em;color:var(--cream);\n    font-weight:600;opacity:0.85;}\n  .hero-title h1{font-size:46px;line-height:1.05;margin:8px 0 0;font-weight:700;\n    letter-spacing:-0.01em;color:#fff;}\n  .hero-title .sub{font-size:14.5px;color:rgba(255,255,255,0.82);margin-top:12px;\n    max-width:30em;font-weight:400;}\n\n  .hero-stats{position:relative;z-index:2;display:grid;\n    grid-template-columns:repeat(4,1fr);gap:1px;margin-top:34px;\n    background:rgba(255,255,255,0.18);border-radius:14px;overflow:hidden;\n    border:1px solid rgba(255,255,255,0.16);}\n  .hero-stats .hs{background:linear-gradient(180deg,rgba(255,255,255,0.10),rgba(255,255,255,0.03));\n    padding:16px 16px 14px;}\n  .hero-stats .hs .l{font-size:11px;color:rgba(255,255,255,0.72);font-weight:500;}\n  .hero-stats .hs .v{font-size:25px;font-weight:700;margin-top:4px;line-height:1;color:#fff;}\n  .hero-stats .hs .v .u{font-size:12px;font-weight:500;color:rgba(255,255,255,0.7);\n    margin-right:3px;}\n  .hero-stats .hs .m{font-size:10.5px;color:var(--cream);font-weight:600;margin-top:5px;}\n\n  .month-tabs{position:relative;z-index:2;display:flex;gap:6px;margin-top:26px;flex-wrap:wrap;}\n  .month-tabs button{font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;\n    border:1px solid rgba(255,255,255,0.28);background:rgba(255,255,255,0.08);\n    color:var(--cream);border-radius:99px;padding:7px 16px;line-height:1;\n    transition:background .14s ease,color .14s ease,transform .1s ease;\n    display:flex;align-items:center;gap:6px;}\n  .month-tabs button:hover{background:rgba(255,255,255,0.16);}\n  .month-tabs button.active{background:var(--cream);color:var(--accent-deep);\n    border-color:var(--cream);font-weight:700;}\n  .month-tabs button .mlabel{font-size:11px;opacity:0.85;}\n  .month-tabs button.active .mlabel{opacity:0.7;}\n  .month-tabs button .empty-dot{width:5px;height:5px;border-radius:50%;\n    background:rgba(255,255,255,0.45);}\n  .month-tabs button.active .empty-dot{display:none;}\n\n  /* ============ SECTION ============ */\n  .section{margin-top:40px;}\n  .section.first{margin-top:36px;}\n  .s-head{display:flex;align-items:baseline;gap:12px;margin-bottom:18px;}\n  .s-head .n{font-size:13px;font-weight:700;color:#fff;\n    background:var(--accent);width:26px;height:26px;border-radius:8px;flex:none;\n    display:flex;align-items:center;justify-content:center;align-self:center;\n    box-shadow:0 3px 8px var(--accent-soft);}\n  .s-head h2{font-size:20px;font-weight:700;margin:0;letter-spacing:-0.01em;}\n  .s-head .sub{font-size:12px;color:var(--faint);margin-right:auto;font-weight:500;}\n\n  .card{background:var(--surface);border:1px solid var(--line);border-radius:16px;\n    box-shadow:0 1px 2px rgba(60,40,20,0.04),0 10px 30px -18px rgba(60,40,20,0.25);}\n\n  /* ---------- budget split: donut + list ---------- */\n  .budget-grid{display:grid;grid-template-columns:0.85fr 1.15fr;gap:18px;align-items:stretch;}\n  .donut-card{padding:24px;display:flex;flex-direction:column;align-items:center;\n    justify-content:center;gap:18px;}\n  .donut-wrap{position:relative;width:188px;height:188px;}\n  .donut-wrap svg{transform:rotate(-90deg) scaleX(-1);}\n  .donut-center{position:absolute;inset:0;display:flex;flex-direction:column;\n    align-items:center;justify-content:center;text-align:center;}\n  .donut-center .big{font-size:30px;font-weight:700;line-height:1;}\n  .donut-center .lbl{font-size:11px;color:var(--faint);font-weight:500;margin-top:4px;}\n  .donut-center .sp{font-size:11px;color:var(--accent-deep);font-weight:600;margin-top:7px;}\n  .donut-legend{display:flex;flex-direction:column;gap:9px;width:100%;}\n  .donut-legend .row{display:flex;align-items:center;gap:9px;font-size:12px;}\n  .donut-legend .d{width:10px;height:10px;border-radius:3px;flex:none;}\n  .donut-legend .nm{font-weight:600;}\n  .donut-legend .pc{margin-right:auto;font-weight:700;font-variant-numeric:tabular-nums;\n    color:var(--muted);}\n\n  .spend-card{padding:6px 0;}\n\n  /* ---------- tables ---------- */\n  table.data{width:100%;border-collapse:collapse;font-variant-numeric:tabular-nums;}\n  table.data thead th{font-size:11px;font-weight:600;color:var(--faint);\n    text-align:right;padding:13px 18px 11px;border-bottom:1px solid var(--line-strong);\n    white-space:nowrap;letter-spacing:0.01em;}\n  table.data td{padding:13px 18px;font-size:13px;border-bottom:1px solid var(--line);\n    text-align:right;}\n  table.data tbody tr:last-child td{border-bottom:none;}\n  .card table.data tbody tr:hover td{background:oklch(0.97 0.008 60);}\n  table.data .name{font-weight:600;}\n  .plat{display:inline-flex;align-items:center;gap:9px;font-weight:600;}\n  .plat .dot{width:10px;height:10px;border-radius:50%;flex:none;\n    box-shadow:0 0 0 3px var(--accent-soft);}\n  table.data tr.total td{background:linear-gradient(90deg,var(--accent-soft),transparent);\n    font-weight:700;border-top:1.5px solid var(--line-strong);}\n  table.data tr.total td:first-child{color:var(--accent-deep);}\n\n  .barcell{min-width:130px;}\n  .bar{position:relative;height:8px;border-radius:99px;background:oklch(0.93 0.01 65);\n    overflow:hidden;margin-top:6px;}\n  .bar > span{position:absolute;top:0;right:0;height:100%;border-radius:99px;\n    background:linear-gradient(90deg,var(--accent),var(--accent-deep));}\n  .bar.good > span{background:linear-gradient(90deg,var(--good),oklch(0.50 0.10 158));}\n  .barlabel{display:flex;justify-content:space-between;font-size:10.5px;color:var(--faint);}\n  .pct{font-weight:700;font-variant-numeric:tabular-nums;color:var(--ink);}\n  .muted{color:var(--faint);}\n\n  /* ---------- chips ---------- */\n  .chip{display:inline-block;padding:3px 10px;border-radius:99px;font-size:10.5px;\n    font-weight:600;white-space:nowrap;}\n  .chip.post{background:var(--accent-soft);color:var(--accent-deep);}\n  .chip.story{background:var(--info-soft);color:var(--info);}\n  .chip.inter{background:var(--good-soft);color:oklch(0.45 0.10 155);}\n  .chip.other{background:oklch(0.92 0.012 65);color:var(--muted);}\n\n  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:18px;}\n\n  /* products mini cards */\n  .prod-card{padding:16px 18px;display:flex;flex-direction:column;gap:11px;}\n  .prod-card .ph{display:flex;justify-content:space-between;align-items:baseline;}\n  .prod-card .pn{font-weight:700;font-size:14px;}\n  .prod-card .pp{font-family:\"Reem Kufi\";font-weight:700;font-size:17px;}\n  .prod-card .pmeta{font-size:11px;color:var(--faint);font-weight:500;}\n\n  .footer{margin-top:46px;background:var(--cocoa);color:rgba(255,255,255,0.85);\n    padding:22px clamp(20px,5vw,0.72in);display:flex;justify-content:space-between;\n    align-items:center;font-size:11.5px;}\n  .footer .mk{width:24px;height:24px;border-radius:50%;background:var(--accent);\n    display:inline-block;vertical-align:middle;margin-left:8px;position:relative;}\n  .footer .mk::after{content:\"\";position:absolute;inset:6px;border-radius:50%;\n    border:1.5px solid var(--cocoa);}\n\n  .lead{font-size:13.5px;color:var(--muted);margin:0 0 16px;max-width:46em;line-height:1.7;}\n\n  /* ---------- edit mode ---------- */\n  .editbar{position:fixed;bottom:22px;left:22px;z-index:99;display:flex;gap:8px;\n    align-items:center;}\n  .editbar button{font-family:\"Calibri MOB\",\"Calibri\",\"IBM Plex Sans Arabic\",sans-serif;font-size:12.5px;\n    font-weight:600;border:none;cursor:pointer;border-radius:99px;padding:11px 18px;\n    display:inline-flex;align-items:center;gap:7px;box-shadow:0 6px 20px -6px rgba(60,40,20,0.5);\n    transition:transform .12s ease,background .15s ease;}\n  .editbar button:active{transform:translateY(1px);}\n  .editbar .toggle{background:var(--cocoa);color:#fff;}\n  .editbar.on .toggle{background:var(--accent);}\n  .editbar .reset{background:var(--surface);color:var(--muted);border:1px solid var(--line-strong);\n    display:none;}\n  .editbar.on .reset{display:inline-flex;}\n  .share-btn{position:fixed;bottom:22px;left:22px;z-index:98;\n    font-family:\"Calibri MOB\",\"Calibri\",\"IBM Plex Sans Arabic\",sans-serif;font-size:12.5px;\n    font-weight:600;border:none;cursor:pointer;border-radius:99px;padding:11px 18px;\n    display:inline-flex;align-items:center;gap:7px;background:var(--accent);color:#fff;\n    box-shadow:0 6px 20px -6px rgba(80,40,20,0.5);transition:transform .12s ease;\n    transform:translateY(-46px);}\n  .share-btn:active{transform:translateY(-45px);}\n  .share-btn svg{width:15px;height:15px;}\n  .editbar svg{width:15px;height:15px;}\n  body.editing [data-edit]{cursor:text;border-radius:4px;\n    transition:background .12s ease,box-shadow .12s ease;}\n  body.editing [data-edit]:hover{background:var(--accent-soft);}\n  body.editing [data-edit]:focus{outline:none;background:#fff;\n    box-shadow:0 0 0 2px var(--accent),0 4px 14px -4px rgba(60,40,20,0.4);}\n  .edit-hint{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:99;\n    background:var(--cocoa);color:#fff;font-size:12px;font-weight:500;padding:9px 16px;\n    border-radius:99px;box-shadow:0 6px 20px -6px rgba(60,40,20,0.5);display:none;}\n  body.editing .edit-hint{display:block;}\n\n  @page{size:A4;margin:0;}\n  @media print{\n    body{background:#fff;}\n    .doc{max-width:none;}\n    .section,table.data tr,.prod-card,.donut-card{break-inside:avoid;}\n    .s-head h2{break-after:avoid;}\n    .card{box-shadow:none;}\n  }\n  @media print{.editbar,.edit-hint,.share-btn{display:none!important;}}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<main class=\"doc\">\n\n  <!-- ============ HERO ============ -->\n  <header class=\"hero\">\n    <div class=\"ring2\"><\u002Fdiv>\n    <div class=\"hero-top\">\n      <div class=\"brand\">\n        <img class=\"mark\" src=\"1a51f4ea-aff0-494c-bb56-3b117deeafd7\" alt=\"قطوف وحلا\">\n        <div>\n          <div class=\"nm\">قطوف وحلا<\u002Fdiv>\n          <div class=\"tg\">تقرير الأداء التسويقي الشهري<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"pill\" id=\"monthPill\">يونيو 2026<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"month-tabs\" id=\"monthTabs\"><\u002Fdiv>\n\n    <div class=\"hero-title\">\n      <div class=\"kick\">الترويج والمحتوى<\u002Fdiv>\n      <h1 id=\"reportTitle\">أداء الترويج لشهر ٦<\u002Fh1>\n      <p class=\"sub\">نظرة شاملة على توزيع الميزانية، ونتائج المنصات الإعلانية، وأداء المنتجات المستهدفة، وجدول المحتوى المنشور خلال الشهر.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"hero-stats\">\n      <div class=\"hs\">\n        <div class=\"l\">الميزانية المخصصة<\u002Fdiv>\n        <div class=\"v tnum\"><span id=\"h_alloc\">80<\u002Fspan><span class=\"u\">ألف ريال<\u002Fspan><\u002Fdiv>\n        <div class=\"m\">5 منصات إعلانية<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"hs\">\n        <div class=\"l\">إجمالي المصروف<\u002Fdiv>\n        <div class=\"v tnum\"><span id=\"h_spend\">60.7<\u002Fspan><span class=\"u\">ألف ريال<\u002Fspan><\u002Fdiv>\n        <div class=\"m\">صرف <span id=\"h_spendpct\">75.9<\u002Fspan>%<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"hs\">\n        <div class=\"l\">إجمالي المشاهدات<\u002Fdiv>\n        <div class=\"v tnum\"><span id=\"h_views\">30.9<\u002Fspan><span class=\"u\">مليون<\u002Fspan><\u002Fdiv>\n        <div class=\"m\">عبر كل المنصات<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"hs\">\n        <div class=\"l\">إجمالي النقرات<\u002Fdiv>\n        <div class=\"v tnum\"><span id=\"h_clicks\">89.5<\u002Fspan><span class=\"u\">ألف<\u002Fspan><\u002Fdiv>\n        <div class=\"m\">≈ <span id=\"h_cpc\">0.66<\u002Fspan> ريال/نقرة<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <div class=\"pad\">\n\n  <!-- ============ 1. BUDGET ============ -->\n  <section class=\"section first\">\n    <div class=\"s-head\">\n      <span class=\"n\">١<\u002Fspan>\n      <h2>توزيع الميزانية<\u002Fh2>\n      <span class=\"sub\">إجمالي 80,000 ريال<\u002Fspan>\n    <\u002Fdiv>\n\n    <div class=\"budget-grid\">\n      <div class=\"card donut-card\">\n        <div class=\"donut-wrap\">\n          <svg width=\"188\" height=\"188\" viewBox=\"0 0 188 188\">\n            <circle cx=\"94\" cy=\"94\" r=\"74\" fill=\"none\" stroke=\"oklch(0.93 0.01 65)\" stroke-width=\"22\"><\u002Fcircle>\n            <g id=\"donutArcs\"><\u002Fg>\n          <\u002Fsvg>\n          <div class=\"donut-center\">\n            <div class=\"big tnum\" id=\"donutBig\">80K<\u002Fdiv>\n            <div class=\"lbl\">ريال مخصص<\u002Fdiv>\n            <div class=\"sp\">صُرف منها <span id=\"donutSp\">76<\u002Fspan>%<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"donut-legend\" id=\"donutLegend\"><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"card spend-card\">\n        <table class=\"data\">\n          <thead>\n            <tr><th>المنصة<\u002Fth><th>المخصص<\u002Fth><th>المصروف<\u002Fth><th>المتبقي<\u002Fth><th class=\"barcell\">نسبة الصرف<\u002Fth><\u002Ftr>\n          <\u002Fthead>\n          <tbody id=\"budgetBody\"><\u002Ftbody>\n        <\u002Ftable>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 2. PLATFORM RESULTS ============ -->\n  <section class=\"section\">\n    <div class=\"s-head\">\n      <span class=\"n\">٢<\u002Fspan>\n      <h2>نتائج المنصات<\u002Fh2>\n      <span class=\"sub\">المشاهدات والنقرات مقابل الصرف<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"card\">\n      <table class=\"data\">\n        <thead>\n          <tr><th>المنصة<\u002Fth><th>المشاهدات<\u002Fth><th>النقرات<\u002Fth><th>المخصص<\u002Fth><th>المصروف<\u002Fth><\u002Ftr>\n        <\u002Fthead>\n        <tbody id=\"platformBody\"><\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 3. PRODUCTS ============ -->\n  <section class=\"section\">\n    <div class=\"s-head\">\n      <span class=\"n\">٣<\u002Fspan>\n      <h2>نتائج المنتجات المستهدفة<\u002Fh2>\n      <span class=\"sub\">المبيعات مقابل الهدف الشهري<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"card\">\n      <table class=\"data\">\n        <thead>\n          <tr><th>المنتج<\u002Fth><th>الهدف اليومي<\u002Fth><th>الهدف الشهري<\u002Fth><th>المباع فعلياً<\u002Fth><th class=\"barcell\">نسبة الإنجاز<\u002Fth><\u002Ftr>\n        <\u002Fthead>\n        <tbody id=\"productBody\"><\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <\u002Fdiv>\n\n  <footer class=\"footer\">\n    <span><span class=\"mk\"><\u002Fspan>قطوف وحلا — تقرير الترويج والمحتوى<\u002Fspan>\n    <span>يونيو 2026<\u002Fspan>\n  <\u002Ffooter>\n\n  <div class=\"editbar\" id=\"editbar\">\n    <button class=\"toggle\" id=\"editToggle\">\n      <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 20h9\"><\u002Fpath><path d=\"M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z\"><\u002Fpath><\u002Fsvg>\n      <span id=\"editLabel\">تفعيل التعديل<\u002Fspan>\n    <\u002Fbutton>\n    <button class=\"reset\" id=\"editReset\">استعادة الأصل<\u002Fbutton>\n  <\u002Fdiv>\n  <button class=\"share-btn\" id=\"shareBtn\">\n    <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"18\" cy=\"5\" r=\"3\"><\u002Fcircle><circle cx=\"6\" cy=\"12\" r=\"3\"><\u002Fcircle><circle cx=\"18\" cy=\"19\" r=\"3\"><\u002Fcircle><line x1=\"8.6\" y1=\"10.5\" x2=\"15.4\" y2=\"6.5\"><\u002Fline><line x1=\"8.6\" y1=\"13.5\" x2=\"15.4\" y2=\"17.5\"><\u002Fline><\u002Fsvg>\n    <span id=\"shareLabel\">نسخ رابط المشاركة<\u002Fspan>\n  <\u002Fbutton>\n  <div class=\"edit-hint\">اضغط على أي رقم لتعديله · النسب والإجماليات تتحدّث تلقائياً<\u002Fdiv>\n\n  <script>\n  (function(){\n    var KEY = 'qutuf-report-v4-data';\n\n    var MONTHS = {6:'يونيو',7:'يوليو',8:'أغسطس',9:'سبتمبر',10:'أكتوبر',11:'نوفمبر',12:'ديسمبر'};\n    var MNUM = {6:'٦',7:'٧',8:'٨',9:'٩',10:'١٠',11:'١١',12:'١٢'};\n\n    var JUNE = {\n      platforms: [\n        {name:'snap ad',    color:'var(--c-snap)',   allocated:33598, spend:30948, views:11250061, clicks:23099},\n        {name:'tik tok ad', color:'var(--c-tiktok)', allocated:25807, spend:12668, views:10407964, clicks:22090},\n        {name:'instagram',  color:'var(--c-insta)',  allocated:9562,  spend:8216,  views:2354652,  clicks:32938},\n        {name:'x ad',       color:'var(--c-x)',      allocated:9478,  spend:8869,  views:6908911,  clicks:11353},\n        {name:'googel ad',  color:'var(--c-google)', allocated:1555,  spend:0,     views:0,        clicks:0}\n      ],\n      products: [\n        {name:'نوفية',          daily:115, monthly:3450, sold:1042},\n        {name:'زويا',           daily:42,  monthly:1260, sold:660},\n        {name:'برنقو بار',      daily:49,  monthly:1470, sold:451},\n        {name:'باسكال',         daily:49,  monthly:1470, sold:143},\n        {name:'فارو ستيكس',     daily:25,  monthly:750,  sold:227},\n        {name:'شوكلاتة قطوف 50غ', daily:null, monthly:null, sold:246},\n        {name:'مملكتي أبراج',    daily:null, monthly:null, sold:1499}\n      ]\n    };\n\n    // a fresh empty month: keep platform names/colors + product names/targets, zero the metrics\n    function blankMonth(){\n      return {\n        platforms: JUNE.platforms.map(function(p){\n          return {name:p.name, color:p.color, allocated:0, spend:0, views:0, clicks:0};\n        }),\n        products: JUNE.products.map(function(p){\n          return {name:p.name, daily:p.daily, monthly:p.monthly, sold:0};\n        })\n      };\n    }\n\n    function freshState(){\n      var m = {};\n      Object.keys(MONTHS).forEach(function(k){ m[k] = (+k===6) ? JSON.parse(JSON.stringify(JUNE)) : blankMonth(); });\n      return {active:6, months:m};\n    }\n\n    var state;\n    // 1) shared link (data embedded in URL) takes priority\n    var fromHash = null;\n    try{\n      var h = location.hash.replace(/^#d=/,'');\n      if(h && location.hash.indexOf('#d=')===0){\n        fromHash = JSON.parse(decodeURIComponent(escape(atob(h.replace(/-/g,'+').replace(/_/g,'/')))));\n      }\n    }catch(e){}\n    function valid(s){ return s && s.months && s.months[6] && s.months[6].platforms; }\n    if(valid(fromHash)){\n      state = fromHash;\n    } else {\n      try{ state = JSON.parse(localStorage.getItem(KEY)); }catch(e){}\n      if(!valid(state)){\n        // migrate any old single-month save\n        var old=null; try{ old = JSON.parse(localStorage.getItem('qutuf-report-v3-data')); }catch(e){}\n        state = freshState();\n        if(old && old.platforms){ state.months[6] = old; }\n      }\n    }\n    // ensure all months exist\n    Object.keys(MONTHS).forEach(function(k){ if(!state.months[k]) state.months[k]=blankMonth(); });\n    if(!state.active || !MONTHS[state.active]) state.active = 6;\n\n    var data = state.months[state.active];\n\n    function save(){ try{ localStorage.setItem(KEY, JSON.stringify(state)); }catch(e){} }\n\n    // ---------- formatting ----------\n    function fmt(n){ if(n===null||n===undefined||isNaN(n)) return '—'; return Math.round(n).toLocaleString('en-US'); }\n    function fmt1(n){ return (Math.round(n*10)/10).toLocaleString('en-US'); }\n    function pct(n){ return (Math.round(n*10)/10); }\n    // parse a typed value back to number (strip commas/spaces, arabic digits)\n    function parseNum(s){\n      if(s===null) return null;\n      s = (''+s).replace(/[\\u066c,\\s]/g,'')\n               .replace(/[\\u0660-\\u0669]/g, function(d){return d.charCodeAt(0)-0x0660;})\n               .replace(/[\\u06f0-\\u06f9]/g, function(d){return d.charCodeAt(0)-0x06f0;});\n      if(s==='' || s==='—') return null;\n      var v = parseFloat(s);\n      return isNaN(v) ? null : v;\n    }\n\n    var editing = false;\n    function ed(){ return editing ? ' contenteditable=\"true\"' : ''; }\n\n    // ---------- render ----------\n    function render(){\n      var P = data.platforms, PR = data.products;\n\n      // -- budget table --\n      var totAlloc=0, totSpend=0;\n      P.forEach(function(p){ totAlloc+=(+p.allocated||0); totSpend+=(+p.spend||0); });\n      var bb = document.getElementById('budgetBody');\n      bb.innerHTML = P.map(function(p,i){\n        var rem = (+p.allocated||0)-(+p.spend||0);\n        var sp = p.allocated>0 ? (p.spend/p.allocated*100) : 0;\n        return '<tr>'+\n          '<td class=\"name\"><span class=\"plat\"><i class=\"dot\" style=\"background:'+p.color+'\"><\u002Fi>'+\n            '<span class=\"f\" data-f=\"p|'+i+'|name\"'+ed()+'>'+p.name+'<\u002Fspan><\u002Fspan><\u002Ftd>'+\n          '<td class=\"tnum f\" data-f=\"p|'+i+'|allocated\"'+ed()+'>'+fmt(p.allocated)+'<\u002Ftd>'+\n          '<td class=\"tnum f\" data-f=\"p|'+i+'|spend\"'+ed()+'>'+fmt(p.spend)+'<\u002Ftd>'+\n          '<td class=\"tnum\">'+fmt(rem)+'<\u002Ftd>'+\n          '<td class=\"barcell\"><div class=\"barlabel\"><span><\u002Fspan><span class=\"pct'+(sp<1?' muted':'')+'\">'+pct(sp)+'%<\u002Fspan><\u002Fdiv>'+\n            '<div class=\"bar\"><span style=\"width:'+Math.min(sp,100)+'%\"><\u002Fspan><\u002Fdiv><\u002Ftd>'+\n        '<\u002Ftr>';\n      }).join('') +\n        '<tr class=\"total\"><td>الإجمالي<\u002Ftd>'+\n        '<td class=\"tnum\">'+fmt(totAlloc)+'<\u002Ftd><td class=\"tnum\">'+fmt(totSpend)+'<\u002Ftd>'+\n        '<td class=\"tnum\">'+fmt(totAlloc-totSpend)+'<\u002Ftd>'+\n        '<td class=\"barcell\"><div class=\"barlabel\"><span><\u002Fspan><span class=\"pct\">'+pct(totAlloc?totSpend/totAlloc*100:0)+'%<\u002Fspan><\u002Fdiv>'+\n        '<div class=\"bar\"><span style=\"width:'+Math.min(totAlloc?totSpend/totAlloc*100:0,100)+'%\"><\u002Fspan><\u002Fdiv><\u002Ftd><\u002Ftr>';\n\n      // -- donut --\n      var C = 2*Math.PI*74, off=0, arcs='', legend='';\n      P.forEach(function(p){\n        var share = totAlloc>0 ? (p.allocated/totAlloc) : 0;\n        var len = share*C;\n        arcs += '<circle cx=\"94\" cy=\"94\" r=\"74\" fill=\"none\" stroke=\"'+p.color+'\" stroke-width=\"22\" '+\n                'stroke-dasharray=\"'+len.toFixed(2)+' '+(C-len).toFixed(2)+'\" stroke-dashoffset=\"'+(-off).toFixed(2)+'\"><\u002Fcircle>';\n        off += len;\n        legend += '<div class=\"row\"><span class=\"d\" style=\"background:'+p.color+'\"><\u002Fspan>'+\n                  '<span class=\"nm\">'+p.name+'<\u002Fspan><span class=\"pc\">'+pct(share*100)+'%<\u002Fspan><\u002Fdiv>';\n      });\n      document.getElementById('donutArcs').innerHTML = arcs;\n      document.getElementById('donutLegend').innerHTML = legend;\n      document.getElementById('donutBig').textContent = fmt1(totAlloc/1000)+'K';\n      document.getElementById('donutSp').textContent = pct(totAlloc?totSpend/totAlloc*100:0);\n\n      // -- platform results table --\n      var totViews=0, totClicks=0;\n      P.forEach(function(p){ totViews+=(+p.views||0); totClicks+=(+p.clicks||0); });\n      var pb = document.getElementById('platformBody');\n      pb.innerHTML = P.map(function(p,i){\n        var z = (!p.views && !p.clicks);\n        return '<tr>'+\n          '<td class=\"name\"><span class=\"plat\"><i class=\"dot\" style=\"background:'+p.color+'\"><\u002Fi>'+p.name+'<\u002Fspan><\u002Ftd>'+\n          '<td class=\"tnum f'+(z?' muted':'')+'\" data-f=\"p|'+i+'|views\"'+ed()+'>'+fmt(p.views)+'<\u002Ftd>'+\n          '<td class=\"tnum f'+(z?' muted':'')+'\" data-f=\"p|'+i+'|clicks\"'+ed()+'>'+fmt(p.clicks)+'<\u002Ftd>'+\n          '<td class=\"tnum\">'+fmt(p.allocated)+'<\u002Ftd>'+\n          '<td class=\"tnum'+(p.spend<1?' muted':'')+'\">'+fmt(p.spend)+'<\u002Ftd>'+\n        '<\u002Ftr>';\n      }).join('') +\n        '<tr class=\"total\"><td>الإجمالي<\u002Ftd><td class=\"tnum\">'+fmt(totViews)+'<\u002Ftd>'+\n        '<td class=\"tnum\">'+fmt(totClicks)+'<\u002Ftd><td class=\"tnum\">'+fmt(totAlloc)+'<\u002Ftd>'+\n        '<td class=\"tnum\">'+fmt(totSpend)+'<\u002Ftd><\u002Ftr>';\n\n      // -- products table --\n      var tD=0,tM=0,tS=0;\n      PR.forEach(function(p){ tD+=(+p.daily||0); tM+=(+p.monthly||0); tS+=(+p.sold||0); });\n      var prb = document.getElementById('productBody');\n      prb.innerHTML = PR.map(function(p,i){\n        var hasTarget = p.monthly!==null && p.monthly!==undefined && p.monthly!=='' && +p.monthly>0;\n        var comp = hasTarget ? (p.sold/p.monthly*100) : 0;\n        var lastCell = hasTarget\n          ? '<td class=\"barcell\"><div class=\"barlabel\"><span><\u002Fspan><span class=\"pct\">'+pct(comp)+'%<\u002Fspan><\u002Fdiv>'+\n            '<div class=\"bar good\"><span style=\"width:'+Math.min(comp,100)+'%\"><\u002Fspan><\u002Fdiv><\u002Ftd>'\n          : '<td class=\"barcell muted\">بدون هدف محدد<\u002Ftd>';\n        return '<tr>'+\n          '<td class=\"name f\" data-f=\"r|'+i+'|name\"'+ed()+'>'+p.name+'<\u002Ftd>'+\n          '<td class=\"tnum f'+(hasTarget?'':' muted')+'\" data-f=\"r|'+i+'|daily\"'+ed()+'>'+fmt(p.daily)+'<\u002Ftd>'+\n          '<td class=\"tnum f'+(hasTarget?'':' muted')+'\" data-f=\"r|'+i+'|monthly\"'+ed()+'>'+fmt(p.monthly)+'<\u002Ftd>'+\n          '<td class=\"tnum f\" data-f=\"r|'+i+'|sold\"'+ed()+'>'+fmt(p.sold)+'<\u002Ftd>'+\n          lastCell+\n        '<\u002Ftr>';\n      }).join('') +\n        '<tr class=\"total\"><td>الإجمالي<\u002Ftd><td class=\"tnum\">'+fmt(tD)+'<\u002Ftd>'+\n        '<td class=\"tnum\">'+fmt(tM)+'<\u002Ftd><td class=\"tnum\">'+fmt(tS)+'<\u002Ftd>'+\n        '<td class=\"barcell\"><div class=\"barlabel\"><span><\u002Fspan><span class=\"pct\">'+pct(tM?tS/tM*100:0)+'%<\u002Fspan><\u002Fdiv>'+\n        '<div class=\"bar good\"><span style=\"width:'+Math.min(tM?tS/tM*100:0,100)+'%\"><\u002Fspan><\u002Fdiv><\u002Ftd><\u002Ftr>';\n\n      // -- hero stats --\n      document.getElementById('h_alloc').textContent  = fmt1(totAlloc/1000);\n      document.getElementById('h_spend').textContent  = fmt1(totSpend/1000);\n      document.getElementById('h_spendpct').textContent = pct(totAlloc?totSpend/totAlloc*100:0);\n      document.getElementById('h_views').textContent  = fmt1(totViews/1000000);\n      document.getElementById('h_clicks').textContent = fmt1(totClicks/1000);\n      document.getElementById('h_cpc').textContent    = totClicks ? (Math.round(totSpend/totClicks*100)/100) : '—';\n\n      // -- chrome: title + pill --\n      document.getElementById('reportTitle').textContent = 'أداء الترويج لشهر ' + MNUM[state.active];\n      document.getElementById('monthPill').textContent = MONTHS[state.active] + ' 2026';\n    }\n\n    // ---------- month tabs ----------\n    function monthHasData(k){\n      var m = state.months[k]; if(!m) return false;\n      var any = m.platforms.some(function(p){ return (+p.allocated||+p.spend||+p.views||+p.clicks); });\n      var anyS = m.products.some(function(p){ return (+p.sold); });\n      return any || anyS;\n    }\n    function buildTabs(){\n      var tabs = document.getElementById('monthTabs');\n      tabs.innerHTML = Object.keys(MONTHS).map(function(k){\n        var act = (+k===+state.active) ? ' active' : '';\n        var dot = monthHasData(k) ? '' : '<span class=\"empty-dot\"><\u002Fspan>';\n        return '<button data-m=\"'+k+'\" class=\"'+act.trim()+'\">'+dot+'شهر '+MNUM[k]+\n               '<span class=\"mlabel\">'+MONTHS[k]+'<\u002Fspan><\u002Fbutton>';\n      }).join('');\n    }\n    function selectMonth(k){\n      state.active = +k;\n      data = state.months[state.active];\n      save();\n      buildTabs();\n      render();\n    }\n    document.getElementById('monthTabs').addEventListener('click', function(e){\n      var b = e.target.closest('button[data-m]'); if(!b) return;\n      selectMonth(b.getAttribute('data-m'));\n    });\n    buildTabs();\n\n    render();\n\n    // ---------- edit wiring ----------\n    var body = document.body;\n    var bar = document.getElementById('editbar');\n    var toggle = document.getElementById('editToggle');\n    var label = document.getElementById('editLabel');\n    var reset = document.getElementById('editReset');\n\n    function setMode(on){\n      editing = on;\n      body.classList.toggle('editing', on);\n      bar.classList.toggle('on', on);\n      label.textContent = on ? 'تم · حفظ وإغلاق' : 'تفعيل التعديل';\n      render();\n    }\n\n    // commit a field edit on blur / Enter\n    function commit(el){\n      var f = el.getAttribute('data-f'); if(!f) return;\n      var parts = f.split('|'); var arr = parts[0]==='p' ? data.platforms : data.products;\n      var obj = arr[+parts[1]]; var key = parts[2];\n      var txt = el.textContent;\n      if(key==='name'){ obj.name = txt.trim() || obj.name; }\n      else { obj[key] = parseNum(txt); }\n      save(); render(); buildTabs();\n    }\n\n    document.addEventListener('blur', function(e){\n      if(editing && e.target.classList && e.target.classList.contains('f')) commit(e.target);\n    }, true);\n    document.addEventListener('keydown', function(e){\n      if(editing && e.key==='Enter' && e.target.classList && e.target.classList.contains('f')){\n        e.preventDefault(); e.target.blur();\n      }\n    });\n\n    toggle.addEventListener('click', function(){ setMode(!editing); });\n    reset.addEventListener('click', function(){\n      if(!confirm('استعادة كل الأرقام الأصلية وحذف تعديلاتك؟')) return;\n      try{ localStorage.removeItem(KEY); }catch(e){}\n      if(location.hash) history.replaceState(null,'',location.pathname+location.search);\n      state = freshState(); data = state.months[state.active]; buildTabs(); render();\n    });\n\n    // ---------- share link (data travels inside the URL) ----------\n    var shareBtn = document.getElementById('shareBtn');\n    var shareLabel = document.getElementById('shareLabel');\n    function encodeData(){\n      var json = JSON.stringify(state);\n      var b64 = btoa(unescape(encodeURIComponent(json)));\n      return b64.replace(/\\+/g,'-').replace(/\\//g,'_').replace(/=+$/,'');\n    }\n    shareBtn.addEventListener('click', function(){\n      var url = location.origin + location.pathname + location.search + '#d=' + encodeData();\n      function done(){ shareLabel.textContent='تم نسخ الرابط ✓'; setTimeout(function(){ shareLabel.textContent='نسخ رابط المشاركة'; },1800); }\n      if(navigator.clipboard && navigator.clipboard.writeText){\n        navigator.clipboard.writeText(url).then(done, function(){ prompt('انسخ الرابط:', url); });\n      } else { prompt('انسخ الرابط:', url); }\n      // reflect current data in the address bar too\n      try{ history.replaceState(null,'','#d='+encodeData()); }catch(e){}\n    });\n  })();\n  <\u002Fscript>\n\n<\u002Fmain>\n\n<\u002Fbody><\u002Fhtml>"
  </script>
